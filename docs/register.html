<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Productivity Tracker</title>
    <script>try{var t=localStorage.getItem('pt_theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}</script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">

    <header>
        <a class="logo" href="login.html">&#9675; Productivity Tracker</a>
        <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">🌙</button>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <h1 class="auth-title">Create your account</h1>
            <p class="auth-subtitle">Your tasks and habits will sync across all your devices</p>

            <div class="auth-error" id="auth-error" style="display:none;"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="e.g. sidh426" autocomplete="username" required maxlength="30" />
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
                </div>
                <div class="form-group">
                    <label for="password">Password <span style="color:var(--muted);font-weight:400;">(min 6 characters)</span></label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required minlength="6" />
                </div>
                <button type="submit" class="btn auth-btn" id="register-btn">Create account</button>
            </form>

            <p class="auth-switch">
                Already have an account? <a href="login.html">Sign in</a>
            </p>
        </div>
    </main>

    <footer>
        CMPA4404 &mdash; Productivity Tracker Capstone
    </footer>

    <script src="auth.js"></script>
    <script>
        // Dark mode toggle
        const root = document.documentElement;
        const btn  = document.getElementById('theme-toggle');
        function syncIcon() { btn.textContent = root.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙'; }
        syncIcon();
        btn.addEventListener('click', () => {
            const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', next);
            try { localStorage.setItem('pt_theme', next); } catch(e) {}
            syncIcon();
        });

        // Register form
        document.getElementById('register-form').addEventListener('submit', async e => {
            e.preventDefault();
            const regBtn  = document.getElementById('register-btn');
            const errorEl = document.getElementById('auth-error');
            errorEl.style.display = 'none';
            regBtn.textContent    = 'Creating account…';
            regBtn.disabled       = true;

            try {
                const res  = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        email:    document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Registration failed');
                saveAuth(data.token, { username: data.username });
                window.location.href = '/index.html';
            } catch(err) {
                errorEl.textContent   = err.message;
                errorEl.style.display = 'block';
                regBtn.textContent    = 'Create account';
                regBtn.disabled       = false;
            }
        });
    </script>
</body>
</html>
